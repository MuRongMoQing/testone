name: Build Test (Multi-Platform)

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: "Ubuntu / GCC"
            c_compiler: gcc
            cpp_compiler: g++

          - os: ubuntu-latest
            name: "Ubuntu / Clang"
            c_compiler: clang
            cpp_compiler: clang++

          - os: windows-latest
            name: "Windows / MSVC"
            c_compiler: cl
            cpp_compiler: cl

    steps:
      - uses: actions/checkout@v4

      # ── Ubuntu ──
      - name: Install system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcpp-httplib-dev libmysqlclient-dev libsodium-dev libssl-dev nlohmann-json3-dev pkg-config
          pkg-config --exists cpp-httplib
          pkg-config --modversion cpp-httplib

      # ── Windows ──
      - name: Setup vcpkg
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git "%RUNNER_TEMP%\vcpkg"
          call "%RUNNER_TEMP%\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Verify vcpkg builtin baseline
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $manifest = Get-Content "${{ github.workspace }}/vcpkg.json" -Raw | ConvertFrom-Json
          $baseline = $manifest.'builtin-baseline'
          if (-not $baseline) {
            throw 'vcpkg.json does not define builtin-baseline'
          }
          git -C "$env:RUNNER_TEMP\vcpkg" cat-file -e "${baseline}:versions/baseline.json"
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg clone does not contain builtin baseline $baseline"
          }

      - name: Install manifest dependencies
        if: runner.os == 'Windows'
        run: "& $env:RUNNER_TEMP\\vcpkg\\vcpkg.exe install --triplet x64-windows --x-manifest-root=${{ github.workspace }}"

      - name: Set CMake toolchain (Windows)
        if: runner.os == 'Windows'
        id: toolchain
        shell: bash
        run: |
          echo "args=-DCMAKE_TOOLCHAIN_FILE=${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          ${{ steps.toolchain.outputs.args }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config Release

      - name: Test
        run: ctest --test-dir ${{ github.workspace }}/build -C Release --output-on-failure
